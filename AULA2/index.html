<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista CATFacts</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        table {
            width: 50%;
            margin: 20px auto;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px;
            border: 1px solid #000000;
        }
    </style>
</head>

<body>

    <h2> Lista Cat Facts </h2>

    <button onclick="carregarFacts()"> Carregar Fatos sobre Gatos </button>

    <table>
        <thead>
            <th>ID</th>
            <th>TEXTO</th>
            <th>Tamanho</th>
        </thead>
        <tbody id="fact">
            <!-- Dados serão carregados automaticamente-->
        </tbody>
    </table>

    <script>
        let cont = 1;
        function carregarFacts() {
            console.log("Entrou na API");
            

            fetch("https://catfact.ninja/fact")
                .then(reponse => reponse.json())
                .then(data => {
                    const tabela = document.getElementById("fact");
                    const linha = `<tr>
                            <td>${cont}</td>
                            <td>${data.fact}</td>
                            <td> ${data.length}</td>
                           <tr>`;
                    tabela.innerHTML += linha;
                    cont++;
                })
                .catch(error => console.error("Erro ao carregar os fatos: ",error ));




        }
    </script>

</body>

</html>
